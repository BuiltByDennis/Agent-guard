# WARNING: This file uses stringData (plaintext secrets) and should NOT be committed or applied directly to a production cluster.
# For production, integrate a secret management tool like External Secrets Operator, Sealed Secrets, or SOPS.
apiVersion: v1
kind: Secret
metadata:
  name: agent-proxy-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:password@db-host:5432/proxy_db"
  REDIS_URL: "redis://redis-host:6379/0"
  JWT_SECRET_KEY: "replace-me"
  OPENAI_API_KEY: "replace-me"
  SENTRY_DSN: "replace-me"
