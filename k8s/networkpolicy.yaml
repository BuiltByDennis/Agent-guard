apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-proxy-network-policy
spec:
  podSelector:
    matchLabels:
      app: agent-proxy
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Restrict egress in prod to specific IPs or CIDR blocks if known.
  # Here we restrict by specific required ports as a baseline.
  - ports:
    - protocol: UDP
      port: 53      # DNS
    - protocol: TCP
      port: 53      # DNS
    - protocol: TCP
      port: 443     # OpenAI API, Sentry
    - protocol: TCP
      port: 5432    # Postgres
    - protocol: TCP
      port: 6543    # Supabase PgBouncer
    - protocol: TCP
      port: 6379    # Redis
