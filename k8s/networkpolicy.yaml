apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-proxy-network-policy
spec:
  podSelector:
    matchLabels:
      app: agent-proxy
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow all egress for OpenAI API and DB connections, but this should be tightened in prod
  - {}
